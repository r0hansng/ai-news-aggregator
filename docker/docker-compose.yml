# ==============================================================================
# AI News Aggregator — Global Service Orchestration
# 
# Architecture:
# - Microservices: Frontend (Bun/Next.js) & Backend (FastAPI).
# - Storage: PostgreSQL 17 (Relational Store).
# - Cache & Broker: Redis 7.
# - Background: Celery Workers (Distributed Processing).
# - Monitoring: Flower (Task Dashboard).
# ==============================================================================

name: ai-news-aggregator

services:
  # ----------------------------------------------------------------------------
  # Cache Service (Redis)
  # ----------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: ai-news-aggregator-cache
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ----------------------------------------------------------------------------
  # Database Service (PostgreSQL)
  # ----------------------------------------------------------------------------
  postgres:
    image: postgres:17
    container_name: ai-news-aggregator-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-ai_news_aggregator}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Ensures backend doesn't attempt to connect before DB is initialized.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------------------------------
  # Database Administration (pgAdmin)
  # ----------------------------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: ai-news-aggregator-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@local.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
    ports:
      - "8080:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  # ----------------------------------------------------------------------------
  # Frontend Service (Next.js / Bun)
  # ----------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: ai-news-aggregator-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    volumes:
      - ../frontend:/app/frontend
      # Anonymous volumes to prevent host node_modules/next from being overwritten.
      - /app/frontend/node_modules
      - /app/frontend/.next
    depends_on:
      - postgres

  # ----------------------------------------------------------------------------
  # Backend Service (FastAPI / Python)
  # ----------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ai-news-aggregator-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend:/app/backend
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    # Entrypoint uses the modular backend package.
    command: uvicorn backend.cmd.api:app --host 0.0.0.0 --port 8000 --reload --reload-dir backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Celery Worker (Distributed Processing)
  # ----------------------------------------------------------------------------
  worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ai-news-aggregator-worker
    env_file:
      - ../.env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
    volumes:
      - ../backend:/app/backend
    command: celery -A backend.infra.tasks.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------------------------
  # Flower (Task Monitoring Dashboard)
  # ----------------------------------------------------------------------------
  flower:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: ai-news-aggregator-flower
    ports:
      - "5555:5555"
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
    command: celery -A backend.infra.tasks.celery_app flower --port=5555
    depends_on:
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  pgadmin_data: